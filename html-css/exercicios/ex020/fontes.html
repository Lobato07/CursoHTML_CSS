<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes baixadas</title>
    <style>
        @font-face {
            font-family: 'nugget';
            src: url(./fontes/Super\ Nugget.ttf) format(opentype);
            font-weight: normal;
            font-style: normal;
            /* tipos de format()
                - opentype(otf)
                - truetype(ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                - svg
                */
        }
        body{
            font-family: 'nugget';
            font-size: 1.5em;
        }

        h1{
            font-family: 'nugget', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        /* SITES PARA DSCOBRIR FONTES EM IMAGENS
        
        - whatfontis (melhores resultados!)
        - fontsquirrel
        - myfonts

        */
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Repellendus, ex obcaecati repellat consequatur officia omnis? Ducimus minus illum omnis, excepturi voluptas possimus voluptatibus eum veritatis et. Similique rerum totam doloribus?</p>
</body>
</html>
