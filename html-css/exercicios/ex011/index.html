<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <!--menores primeiro-->
        <source media="(max-width: 750px)" srcset="imagens/pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/media.png" type="image/png">
        <img src="imagens/grande.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a Reproduzir áudios em HTML5.</p>
    <audio src="midia/lixo.mp3" controls></audio>
    <!-- MP3 WAV OGG - Formatos de áudioa aceitos-->
     <audio preload="metadata"> <!--Carrega apenas algumas infos-->
        <!--Caso ele não carregue, vai tentar o próxima a baixo-->
        <source src="midia/lixo.mp3" type="audio/mpeg">
        <source src="midia/lixo.ogg" type="audio/ogg">
        <source src="midia/lixo.wav" type="audio/wav">
        <!--EVITA WAV, é pessadíssimo!-->
        <p>Infelizmente seu navegador não consegue reproduzir o áudio</p>
        <!-- No material em PDF tem todos os midia types-->
     </audio>
</body>
</html>
