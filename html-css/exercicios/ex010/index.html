<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Links</title>
</head>
<body>
    <h1>Usando links externos</h1>
    <p>Você pode acessar o meu <a href="https://github.com/Lobato-py" target="_blank" rel="external">repositório público no Github</a></p>
    <!--target="_blank" rel="external" faz com que o link abra uma aba nova-->
    <p>Você também pode acessar o meu <a href="https://www.youtube.com/@Bolatios" target="_blank" rel="external">canal gratuito no youtube</a></p>
    <h2>Usando Links internos</h2>
    <p>Esta é a primeira página do site. Se você quiser, pode acessar também a minha <a href="pag002.html" rel="next">segunda página</a></p>
    <!--o next serve para dizer ao Google que é a próxima página-->
</body>
</html>
